name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  CARGO_TARGET_DIR: target
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  RUST_TOOLCHAIN: 1.94.0

jobs:
  publish-container:
    name: Publish container (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-22.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: stargate-${{ matrix.arch }}

      - name: Build binary
        run: cargo +"$RUST_TOOLCHAIN" build --release --locked -p stargate

      - name: Compute image tag
        id: image
        shell: bash
        run: |
          image="$(tr '[:upper:]' '[:lower:]' <<< "$IMAGE_NAME")"

          printf 'tag=%s\n' "${image}:${GITHUB_SHA}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        shell: bash
        run: docker build --platform "${{ matrix.platform }}" -t "${{ steps.image.outputs.tag }}" .

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        shell: bash
        run: docker push "${{ steps.image.outputs.tag }}"

  publish-manifest:
    name: Publish container manifest
    runs-on: ubuntu-22.04
    needs:
      - publish-container
    steps:
      - name: Compute image tags
        id: image
        shell: bash
        run: |
          image="$(tr '[:upper:]' '[:lower:]' <<< "$IMAGE_NAME")"
          printf 'manifest=%s\n' "${image}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          printf 'amd64=%s\n' "${image}:${GITHUB_SHA}-amd64" >> "$GITHUB_OUTPUT"
          printf 'arm64=%s\n' "${image}:${GITHUB_SHA}-arm64" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.manifest }}" \
            "${{ steps.image.outputs.amd64 }}" \
            "${{ steps.image.outputs.arm64 }}"
          docker buildx imagetools inspect "${{ steps.image.outputs.manifest }}"
